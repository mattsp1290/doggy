name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: nim-lang/setup-nim-action@v2
        with:
          nim-version: stable
          no-color: true

      - name: Cache Nim compiler
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: ${{ runner.os }}-nimble-${{ hashFiles('doggy.nimble') }}
          restore-keys: |
            ${{ runner.os }}-nimble-

      - name: Run unit tests
        run: |
          nim c --mm:orc --threads:on -d:ssl --hints:off -r tests/test_json_emit.nim
          nim c --mm:orc --threads:on -d:ssl --hints:off -r tests/test_site.nim
          nim c --mm:orc --threads:on -d:ssl --hints:off -r tests/test_uuid.nim
          nim c --mm:orc --threads:on -d:ssl --hints:off -r tests/test_statsd_types.nim
          nim c --mm:orc --threads:on -d:ssl --hints:off -r tests/test_queue.nim
          nim c --mm:orc --threads:on -d:ssl --hints:off -r tests/test_events_types.nim
          nim c --mm:orc --threads:on -d:ssl --hints:off -r tests/test_http_client.nim
          nim c --mm:orc --threads:on -d:ssl --hints:off -r tests/dogstatsd/test_encoder.nim
          nim c --mm:orc --threads:on -d:ssl --hints:off -r tests/dogstatsd/test_client.nim
          nim c --mm:orc --threads:on -d:ssl --hints:off -r tests/rum/test_session.nim
          nim c --mm:orc --threads:on -d:ssl --hints:off -r tests/rum/test_vitals.nim
          nim c --mm:orc --threads:on -d:ssl --hints:off -r tests/rum/test_serialize.nim
          nim c --mm:orc --threads:on -d:ssl --hints:off -r tests/error_tracking/test_serialize.nim

      - name: Build check (examples)
        run: |
          nim check --mm:orc --threads:on -d:ssl --hints:off examples/dogstatsd.nim
          nim check --mm:orc --threads:on -d:ssl --hints:off examples/rum.nim
          nim check --mm:orc --threads:on -d:ssl --hints:off examples/error_tracking.nim
          nim check --mm:orc --threads:on -d:ssl --hints:off examples/events.nim

      - name: Build check (library modules)
        run: |
          nim check --mm:orc --threads:on -d:ssl --hints:off src/doggy/queue.nim
          nim check --mm:orc --threads:on -d:ssl --hints:off src/doggy/http_client.nim
          nim check --mm:orc --threads:on -d:ssl --hints:off src/doggy/dogstatsd/client.nim
          nim check --mm:orc --threads:on -d:ssl --hints:off src/doggy/rum/serialize.nim
          nim check --mm:orc --threads:on -d:ssl --hints:off src/doggy/rum/exporter.nim
          nim check --mm:orc --threads:on -d:ssl --hints:off src/doggy/error_tracking/exporter.nim
          nim check --mm:orc --threads:on -d:ssl --hints:off src/doggy/events/client.nim
          nim check --mm:orc --threads:on -d:ssl --hints:off src/doggy.nim

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Only run on pushes to main when secrets are available.
    # PRs from forks do not have access to secrets and skip this job.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
      DD_CLIENT_TOKEN: ${{ secrets.DD_CLIENT_TOKEN }}
      DD_APPLICATION_ID: ${{ secrets.DD_APPLICATION_ID }}
      DD_SITE: us3.datadoghq.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: nim-lang/setup-nim-action@v2
        with:
          nim-version: stable
          no-color: true

      - name: Cache Nim compiler
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: ${{ runner.os }}-nimble-${{ hashFiles('doggy.nimble') }}
          restore-keys: |
            ${{ runner.os }}-nimble-

      - name: Check required secrets
        run: |
          if [ -z "$DD_API_KEY" ]; then
            echo "DD_API_KEY secret not set — skipping integration tests"
            exit 0
          fi
          echo "Secrets available, running integration tests"

      - name: Run integration tests
        if: env.DD_API_KEY != ''
        run: |
          # Integration tests send real payloads to DD_SITE=us3.datadoghq.com.
          # Each test skips itself gracefully when required env vars are absent.
          # Pup-based Datadog query assertions require PUP_BIN + DD_APP_KEY;
          # when unavailable, tests pass after verifying the send-path only.
          # DogStatsD pup assertion additionally requires DD_STATSD_VERIFY_DELIVERY
          # (and a local Agent) — not set here; that test runs as send-only.
          nimble integration
